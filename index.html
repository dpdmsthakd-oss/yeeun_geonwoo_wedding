<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예은 ♡ 건우 결혼합니다</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f1f1; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; font-family: 'Nanum Myeongjo', serif; }
        .envelope-wrapper { position: relative; cursor: pointer; margin-top: 80px; margin-bottom: 50px; }
        .envelope { position: relative; width: 320px; height: 220px; background-color: #d1bfa7; border-radius: 0 0 10px 10px; z-index: 1; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .envelope::before { content: ""; position: absolute; top: 0; z-index: 4; border-top: 120px solid #c2b09a; border-left: 160px solid transparent; border-right: 160px solid transparent; transform-origin: top; transition: transform 0.6s ease-in-out; }
        .envelope-wrapper.open .envelope::before { transform: rotateX(180deg); z-index: 0; }
        .letter { position: absolute; bottom: 10px; left: 10px; width: 300px; height: 200px; background-color: white; padding: 25px; box-sizing: border-box; transition: transform 0.6s ease-in-out, height 0.6s ease-in-out; z-index: 2; text-align: center; overflow: hidden; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .envelope-wrapper.open .letter { transform: translateY(-100px); height: auto; min-height: 650px; padding-bottom: 40px; }
        .main-img { width: 100%; border-radius: 5px; margin-bottom: 20px; }
        
        /* 물방울 하트 애니메이션 */
        .drop-seal { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
        .water-drop { width: 20px; height: 20px; background-color: #ffb7c5; border-radius: 0 50% 50% 50%; transform: rotate(45deg); animation: drip 2s infinite; }
        @keyframes drip {
            0% { transform: translateY(-100px) scale(0.8) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(0) scale(1.5) rotate(0deg); border-radius: 50%; background-color: #ff6b81; opacity: 0; }
        }
        .water-drop::before, .water-drop::after { content: ''; position: absolute; width: 100%; height: 100%; background-color: inherit; border-radius: 50%; }
        .water-drop::before { top: -50%; left: 0; }
        .water-drop::after { left: -50%; top: 0; }

        /* 버튼 스타일 */
        .map-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background-color: #8d7d66; color: white; text-decoration: none; border-radius: 5px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="drop-seal"><div class="water-drop"></div></div>
        <div class="envelope"></div>
        <div class="letter">
            <img src="main.jpg.jpg" alt="Wedding Photo" class="main-img">
            <h2 style="color:#555; font-size: 20px;">이건우 ♡ 최예은</h2>
            <p style="color:#777; line-height:1.8; font-size: 15px;">
                서로가 마주 보며 다진 약속을<br>
                믿음으로 지켜나가겠습니다.<br>
                귀한 걸음으로 축복해 주세요.
            </p>
            
            <div style="margin-top:30px; border-top:1px solid #eee; padding-top:20px; font-size:14px; color:#444; line-height: 2;">
                <p><b>일시:</b> 2026년 10월 3일(토) 낮 12시 30분</p>
                <p><b>장소:</b> 한국기독교연합회관 웨딩홀</p>
                <p style="font-size: 12px; color: #888;">(서울 종로구 김상옥로 30)</p>
                
                <a href="https://m.map.naver.com/search2/search.naver?query=한국기독교연합회관웨딩홀" target="_blank" class="map-btn">네이버 지도 보기</a>
            </div>

            <div style="margin-top:30px; border-top:1px solid #eee; padding-top:20px; font-size:13px;">
                <p style="color: #8d7d66; font-weight: bold;">마음 전하실 곳</p>
                <p>신부 최예은: 국민 123-456789-01</p>
                <p>신랑 이건우: 신한 987-654321-02</p>
            </div>
            
            <p style="font-size:11px; color:#bbb; margin-top:40px;">봉투를 터치하면 닫힙니다.</p>
        </div>
    </div>
</body>
</html>
