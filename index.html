<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이건우 & 최예은 결혼합니다</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background: #fdfbfb; color: #333; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { padding: 80px 20px; background: #fff5f5; }
        .main-img { width: 90%; height: 300px; background: #eee; margin: 20px auto; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .section { padding: 50px 20px; border-bottom: 1px solid #f0f0f0; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        .gallery div { aspect-ratio: 1/1; background: #eee; border-radius: 4px; }
        .account-box { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .btn-kakao { background: #fee500; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        h1 { font-size: 22px; letter-spacing: 3px; color: #b8928a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WEDDING INVITATION</h1>
            <div class="main-img">메인 사진</div>
            <h2>이건우 & 최예은</h2>
            <p>2026. 10. 03. 토요일 오후 12:30<br>한국기독교연합회관 3층</p>
        </div>

        <div class="section">
            <p>함께 맞는 열 번째 가을,</p>
            <p>사랑과 신뢰로 하나가 되려 합니다.</p>
            <p>귀한 걸음 하시어 축복해 주세요.</p>
        </div>

        <div class="section">
            <h3>GALLERY</h3>
            <div class="gallery">
                <div>1</div><div>2</div><div>3</div>
                <div>4</div><div>5</div><div>6</div>
                <div>7</div><div>8</div><div>9</div>
            </div>
        </div>

        <div class="section">
            <h3>마음 전하실 곳</h3>
            <div class="account-box">
                <p><b>신랑측</b> 부 이건우<br>신한 110-XXX-XXXXXX <button class="btn-kakao">송금</button></p>
            </div>
            <div class="account-box">
                <p><b>신부측</b> 부 최예은<br>국민 XXX-XXXX-XXXX <button class="btn-kakao">송금</button></p>
            </div>
        </div>
    </div>
</body>
</html>
