<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예은 ♡ 건우 결혼합니다</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fcfaf9; margin: 0; font-family: 'Nanum Myeongjo', serif; color: #333; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.05); padding-bottom: 50px; }
        
        /* 💧 상단 물방울 하트 감성존 */
        .top-visual { height: 150px; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; background: #fff5f5; }
        .water-drop { position: absolute; width: 20px; height: 20px; background-color: #ffb7c5; border-radius: 0 50% 50% 50%; transform: rotate(45deg); animation: drip 2s infinite; }
        @keyframes drip {
            0% { transform: translateY(-80px) scale(0.8) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(20px) scale(1.5) rotate(0deg); border-radius: 50%; background-color: #ff6b81; opacity: 0; }
        }
        .water-drop::before, .water-drop::after { content: ''; position: absolute; width: 100%; height: 100%; background-color: inherit; border-radius: 50%; }
        .water-drop::before { top: -50%; left: 0; }
        .water-drop::after { left: -50%; top: 0; }

        /* 메인 사진 */
        .main-img-wrap { padding: 20px; }
        .main-img-wrap img { width: 100%; border-radius: 5px; }

        /* 섹션 공통 스타일 */
        .section { padding: 40px 20px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .section-title { font-size: 14px; color: #8d7d66; letter-spacing: 2px; margin-bottom: 20px; font-weight: bold; }
        
        /* 📸 3x3 갤러리 */
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 0 20px; }
        .gallery img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 2px; }

        /* 📅 달력 디자인 */
        .calendar { display: inline-block; width: 100%; max-width: 300px; margin-top: 10px; }
        .calendar-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .calendar-table th { padding: 10px; color: #888; font-weight: normal; }
        .calendar-table td { padding: 10px; position: relative; }
        .today { background: #ff6b81; color: white; border-radius: 50%; display: inline-block; width: 25px; height: 25px; line-height: 25px; }
